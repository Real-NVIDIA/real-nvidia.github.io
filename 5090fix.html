<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>download rtx 5090 free working 2026</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    text-align: center;
    width: 400px;
}

h1 {
    margin-bottom: 20px;
    font-weight: normal;
}

.bar {
    width: 100%;
    height: 25px;
    background: #333;
    border-radius: 5px;
    overflow: hidden;
}

.fill {
    width: 0%;
    height: 100%;
    background: #00bfff;
}

#percent {
    margin-top: 15px;
    font-size: 20px;
}
</style>
</head>
<body>

<div class="container">
    <h1>Installing NVIDIA GeForce RTX 5090...</h1>

    <div class="bar">
        <div class="fill" id="fill"></div>
    </div>

    <div id="percent">0%</div>
</div>

<script>
let progress = 0;
const fill = document.getElementById("fill");
const percent = document.getElementById("percent");

const interval = setInterval(() => {
    progress++;

    fill.style.width = progress + "%";
    percent.textContent = progress + "%";

    if (progress >= 100) {
        clearInterval(interval);

        // Redirect to the image
        window.location.href = "https://real-nvidia.github.io/geforce-rtx-5090-learn-more-og-1200x630.jpg";
    }
}, 30);
</script>

</body>
</html>
